<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jukskei Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --blue: #3b82f6;
            --green: #16a34a;
            --yellow: #facc15;
            --border: #334155;
        }

        /* Prevent the browser from moving the "window" at all */
        html, body {
            overflow: hidden;
            height: 100%;
            position: fixed;
            width: 100%;
            margin: 0;
            background: var(--bg);
            font-family: system-ui, -apple-system, sans-serif;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100svh; /* Use SVH for mobile address bar safety */
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        /* HEADER AREA */
        header {
            flex-shrink: 0;
            padding: 10px;
            z-index: 100;
            background: var(--bg);
            border-bottom: 2px solid var(--border);
        }

        .score-row { display: flex; justify-content: space-around; font-size: 20px; font-weight: bold; color: white; margin-bottom: 10px; }
        .timer-row { background: var(--panel); border-radius: 8px; padding: 8px; display: flex; justify-content: space-between; align-items: center; color: white; }

        /* SCROLLABLE TABLE AREA */
        .scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0 5px;
            background: var(--bg);
        }

        table { width: 100%; border-spacing: 0 4px; border-collapse: separate; }
        thead th { position: sticky; top: 0; background: #334155; color: white; font-size: 10px; padding: 10px 0; z-index: 50; }
        td { background: var(--panel); height: 45px; text-align: center; color: white; }

        /* Highlight classes */
        .block { font-weight: bold; opacity: 0.1; font-size: 14px; }
        .active-a { background: var(--green) !important; opacity: 1 !important; color: white; }
        .active-b { background: var(--blue) !important; opacity: 1 !important; color: white; }

        /* CONTROLS AREA (The Anchor) */
        footer {
            flex-shrink: 0;
            background: var(--panel);
            border-top: 2px solid var(--border);
            padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
        }

        .btn-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .pen-btn { width: 45px; height: 45px; border-radius: 50%; border: none; color: white; font-size: 20px; font-weight: bold; }
        .pen-val { font-size: 28px; font-weight: bold; color: var(--yellow); min-width: 35px; text-align: center; }

        .input-row { display: flex; gap: 8px; }
        input { flex: 0 0 60px; height: 45px; background: var(--bg); border: 2px solid var(--border); border-radius: 8px; color: white; text-align: center; font-size: 18px; font-weight: bold; }
        .finish-btn { flex: 1; height: 45px; background: var(--blue); border: none; border-radius: 8px; color: white; font-weight: bold; }

    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="score-row">
            <span>Kranspoort: <span id="sA">0</span></span>
            <span>|</span>
            <span>Opponente: <span id="sB">0</span></span>
        </div>
        <div class="timer-row">
            <span id="timerDisp" style="font-family: monospace; font-size: 24px;">30:00</span>
            <button onclick="toggleTimer()" style="background:var(--green); border:none; color:white; padding:5px 12px; border-radius:5px;">START</button>
        </div>
    </header>

    <div class="scroll-area" id="scroller">
        <table>
            <thead>
                <tr>
                    <th>P</th><th>✓</th><th style="width:70px">TEAM A</th><th>#</th><th style="width:70px">TEAM B</th><th>✓</th><th>P</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <footer>
        <div class="btn-row">
            <div style="display:flex; gap:5px; align-items:center;">
                <button class="pen-btn" style="background:var(--green)" onclick="changePen('A', 1)">+</button>
                <button class="pen-btn" style="background:#ef4444" onclick="changePen('A', -1)">-</button>
                <span class="pen-val" id="pA">0</span>
            </div>
            <span style="color:#94a3b8; font-size:12px;">PENNE</span>
            <div style="display:flex; gap:5px; align-items:center;">
                <span class="pen-val" id="pB">0</span>
                <button class="pen-btn" style="background:var(--green)" onclick="changePen('B', 1)">+</button>
                <button class="pen-btn" style="background:#ef4444" onclick="changePen('B', -1)">-</button>
            </div>
        </div>
        <div class="input-row">
            <input type="number" id="lA" placeholder="Lê" inputmode="decimal">
            <button class="finish-btn" onclick="finishRound()">EINDIG RONDTE</button>
            <input type="number" id="lB" placeholder="Lê" inputmode="decimal">
        </div>
    </footer>
</div>

<script>
    let scoreA = 0, scoreB = 0, penA = 0, penB = 0;

    // Generate Table
    const body = document.getElementById('tableBody');
    for (let i = 1; i <= 23; i++) {
        body.innerHTML += `
            <tr id="r-${i}">
                <td style="font-size:9px">${i <= 10 ? i : ''}</td>
                <td>${i <= 10 ? `<input type="checkbox" id="cA-${i}" disabled>` : ''}</td>
                <td id="tA-${i}"><div class="block">${i}</div></td>
                <td style="background:#334155; font-weight:bold;">${i}</td>
                <td id="tB-${i}"><div class="block">${i}</div></td>
                <td>${i <= 10 ? `<input type="checkbox" id="cB-${i}" disabled>` : ''}</td>
                <td style="font-size:9px">${i <= 10 ? i : ''}</td>
            </tr>`;
    }

    function changePen(team, val) {
        if (team === 'A') {
            if (val > 0 && penA < 10) { penA++; document.getElementById('cA-'+penA).checked = true; }
            else if (val < 0 && penA > 0) { document.getElementById('cA-'+penA).checked = false; penA--; }
            document.getElementById('pA').innerText = penA;
        } else {
            if (val > 0 && penB < 10) { penB++; document.getElementById('cB-'+penB).checked = true; }
            else if (val < 0 && penB > 0) { document.getElementById('cB-'+penB).checked = false; penB--; }
            document.getElementById('pB').innerText = penB;
        }
    }

    function finishRound() {
        let lA = parseInt(document.getElementById('lA').value) || 0;
        let lB = parseInt(document.getElementById('lB').value) || 0;
        let diff = Math.abs(penA - penB);
        
        if (penA > penB) scoreA += (diff * 3); else if (penB > penA) scoreB += (diff * 3);
        if (lA > lB) scoreA += lA; else if (lB > lA) scoreB += lB;
        
        scoreA = Math.min(scoreA, 23); scoreB = Math.min(scoreB, 23);
        
        // Update display
        document.getElementById('sA').innerText = scoreA;
        document.getElementById('sB').innerText = scoreB;
        
        for (let i = 1; i <= 23; i++) {
            document.getElementById(`tA-${i}`).firstElementChild.className = i <= scoreA ? 'block active-a' : 'block';
            document.getElementById(`tB-${i}`).firstElementChild.className = i <= scoreB ? 'block active-b' : 'block';
        }

        // Reset inputs
        penA = 0; penB = 0;
        document.getElementById('pA').innerText = 0; document.getElementById('pB').innerText = 0;
        document.getElementById('lA').value = ''; document.getElementById('lB').value = '';
        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        
        // Kill keyboard
        document.activeElement.blur();
        
        // Scroll logic (Manual offset to prevent window jump)
        const targetIdx = Math.max(scoreA, scoreB, 1);
        const row = document.getElementById('r-' + targetIdx);
        const scroller = document.getElementById('scroller');
        if (row) {
            scroller.scrollTop = row.offsetTop - 50; 
        }
    }

    // Basic Timer
    let tInterval, sec = 1800;
    function toggleTimer() {
        if (tInterval) { clearInterval(tInterval); tInterval = null; }
        else { tInterval = setInterval(() => {
            sec--;
            let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('timerDisp').innerText = `${m}:${s<10?'0':''}${s}`;
        }, 1000); }
    }
</script>
</body>
</html>
