<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jukskei Scoreboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 10px;
        }
        .container { max-width: 950px; margin: auto; }
        
        #scoreDisplay { font-size: 28px; margin: 15px 0; font-weight: bold; }
        .editable-name { border-bottom: 2px dashed #3b82f6; padding: 2px 5px; cursor: text; color: #60a5fa; }

        .timer-box { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155; }
        #timerDisplay { font-size: 55px; font-family: monospace; color: #f8fafc; margin: 5px 0; font-weight: bold; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 3px; background: #0f172a; margin-top: 10px; }
        th { background: #334155; padding: 12px 2px; font-size: 13px; text-transform: uppercase; color: #cbd5e1; }
        td { background: #1e293b; height: 38px; border-radius: 4px; }
        
        /* High-Visibility Progress Bar */
        .score-block {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; font-weight: bold; font-size: 14px; color: rgba(255,255,255,0.15);
        }
        .active-A { background: #16a34a !important; color: white !important; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); border: 1px solid #4ade80; }
        .active-B { background: #2563eb !important; color: white !important; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); border: 1px solid #60a5fa; }

        /* Brighter Checkboxes */
        input[type="checkbox"] { 
            transform: scale(2.2); 
            cursor: default;
            accent-color: #facc15; /* Bright Yellow for checked state */
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
        }

        /* Buttons */
        .big-btn { font-size: 35px; padding: 10px 40px; background: #22c55e; border: none; border-radius: 12px; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #16a34a; }
        .big-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #16a34a; }
        
        .small-btn { font-size: 18px; padding: 10px 20px; background: #ef4444; border: none; border-radius: 10px; color: white; cursor: pointer; box-shadow: 0 4px 0 #b91c1c; }
        .small-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b91c1c; }

        .add-round { padding: 15px; font-size: 18px; background: #3b82f6; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }
        .new-game-btn { background: #6366f1; width: 100%; margin: 10px 0; border: 2px solid rgba(255,255,255,0.3); }
        
        .controls-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; gap: 10px; }
        .pen-display { font-size: 45px; font-weight: bold; min-width: 60px; color: #facc15; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        input[type="number"] { width: 75px; padding: 12px; background: #0f172a; color: white; border: 2px solid #334155; border-radius: 8px; font-size: 20px; font-weight: bold; text-align: center; }
        select { background: #0f172a; color: white; padding: 8px; border-radius: 6px; border: 1px solid #475569; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="scoreDisplay">
        <span id="teamAName" class="editable-name" contenteditable="true">Kranspoort</span>: <span id="valA">0</span> | 
        <span id="teamBName" class="editable-name" contenteditable="true">Opponente</span>: <span id="valB">0</span>
    </h2>

    <div class="timer-box">
        <select id="gameTime">
            <option value="20">20</option><option value="25">25</option>
            <option value="30" selected>30</option><option value="35">35</option>
            <option value="40">40</option><option value="45">45</option>
            <option value="50">50</option><option value="55">55</option>
            <option value="60">60</option>
        </select>
        <button class="add-round" style="padding:8px 15px; background:#16a34a;" onclick="startTimer()">Start</button>
        <button class="add-round" style="padding:8px 15px; background:#64748b;" onclick="pauseTimer()">Pause</button>
        <h1 id="timerDisplay">00:00</h1>
    </div>

    <button class="add-round new-game-btn" onclick="fullReset()">Nuwe Wedstryd (Total Reset)</button>

    <div class="controls-row">
        <div style="display:flex; align-items:center; gap:12px;">
            <button class="big-btn" onclick="addPen('A')">+1</button>
            <button class="small-btn" onclick="removePen('A')">-1</button>
            <span id="penA" class="pen-display">0</span>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
            <span id="penB" class="pen-display">0</span>
            <button class="big-btn" onclick="addPen('B')">+1</button>
            <button class="small-btn" onclick="removePen('B')">-1</button>
        </div>
    </div>

    <div class="controls-row">
        <input type="number" id="leA" placeholder="Lê">
        <button class="add-round" style="flex-grow:1; background:#2563eb;" onclick="addRound()">Eindig Rondte</button>
        <input type="number" id="leB" placeholder="Lê">
    </div>

    <table id="scoreTable">
        <thead>
            <tr>
                <th>Penne</th><th>✓</th><th style="background:transparent; width:5px;"></th>
                <th>KRANSPOORT</th><th>Telling</th><th>OPPONENTE</th>
                <th style="background:transparent; width:5px;"></th><th>✓</th><th>Penne</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
// ================= TABLE GENERATION =================
const tbody = document.querySelector("#scoreTable tbody");
for (let i = 1; i <= 23; i++) {
    const row = document.createElement("tr");
    row.innerHTML = `
        <td style="font-size:12px; color:#94a3b8;">${i <= 10 ? i : ""}</td>
        <td>${i <= 10 ? '<input type="checkbox" disabled>' : ""}</td>
        <td style="background:transparent;"></td>
        <td id="trackA-${i}"><div class="score-block">${i}</div></td>
        <td style="background:#334155; font-weight:bold; color:white;">${i}</td>
        <td id="trackB-${i}"><div class="score-block">${i}</div></td>
        <td style="background:transparent;"></td>
        <td>${i <= 10 ? '<input type="checkbox" disabled>' : ""}</td>
        <td style="font-size:12px; color:#94a3b8;">${i <= 10 ? i : ""}</td>
    `;
    tbody.appendChild(row);
}

// ================= LOGIC =================
let penA = 0, penB = 0, scoreA = 0, scoreB = 0;

function updateScoreDisplay() {
    document.getElementById("valA").innerText = scoreA;
    document.getElementById("valB").innerText = scoreB;
    renderProgress();
}

function renderProgress() {
    for (let i = 1; i <= 23; i++) {
        const blockA = document.getElementById(`trackA-${i}`).firstElementChild;
        i <= scoreA ? blockA.classList.add('active-A') : blockA.classList.remove('active-A');

        const blockB = document.getElementById(`trackB-${i}`).firstElementChild;
        i <= scoreB ? blockB.classList.add('active-B') : blockB.classList.remove('active-B');
    }
}

function fullReset() {
    if (confirm("Nuwe wedstryd? Kranspoort bly, Opponente word nul.")) {
        scoreA = 0; scoreB = 0;
        document.getElementById("teamBName").innerText = "Opponente";
        updateScoreDisplay();
        resetRoundInputs();
        resetTimer();
    }
}

function addRound() {
    let leA = parseInt(document.getElementById("leA").value) || 0;
    let leB = parseInt(document.getElementById("leB").value) || 0;
    let diff = Math.abs(penA - penB);
    let penPoints = diff * 3;
    let roundA = 0, roundB = 0;

    if (penA > penB) {
        roundA += penPoints;
        if (leA > leB) roundA += leA; else roundB += leB;
    } else if (penB > penA) {
        roundB += penPoints;
        if (leB > leA) roundB += leB; else roundA += leA;
    }
    
    scoreA += roundA; scoreB += roundB;
    if (scoreA > 23) scoreA = 23; if (scoreB > 23) scoreB = 23;
    updateScoreDisplay();
    resetRoundInputs();
}

function resetRoundInputs() {
    penA = 0; penB = 0;
    document.getElementById("penA").innerText = 0;
    document.getElementById("penB").innerText = 0;
    document.getElementById("leA").value = "";
    document.getElementById("leB").value = "";
    document.querySelectorAll("#scoreTable input[type='checkbox']").forEach(cb => cb.checked = false);
}

function addPen(team) {
    const rows = document.querySelectorAll("#scoreTable tbody tr");
    if (team === 'A' && penA < 10) {
        rows[penA].children[1].querySelector("input").checked = true;
        penA++;
    } else if (team === 'B' && penB < 10) {
        rows[penB].children[7].querySelector("input").checked = true;
        penB++;
    }
    document.getElementById("pen" + team).innerText = (team === 'A' ? penA : penB);
}

function removePen(team) {
    const rows = document.querySelectorAll("#scoreTable tbody tr");
    if (team === 'A' && penA > 0) {
        penA--;
        rows[penA].children[1].querySelector("input").checked = false;
    } else if (team === 'B' && penB > 0) {
        penB--;
        rows[penB].children[7].querySelector("input").checked = false;
    }
    document.getElementById("pen" + team).innerText = (team === 'A' ? penA : penB);
}

let countdown, totalSeconds = 0, isPaused = false;
function startTimer() {
    clearInterval(countdown);
    totalSeconds = parseInt(document.getElementById("gameTime").value) * 60;
    isPaused = false;
    countdown = setInterval(() => {
        if (isPaused) return;
        let min = Math.floor(totalSeconds / 60), sec = totalSeconds % 60;
        document.getElementById("timerDisplay").innerText = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        if (totalSeconds <= 0) { clearInterval(countdown); alert("Tyd verby!"); }
        totalSeconds--;
    }, 1000);
}
function pauseTimer() { isPaused = !isPaused; }
function resetTimer() { clearInterval(countdown); document.getElementById("timerDisplay").innerText = "00:00"; }
</script>
</body>
</html>
