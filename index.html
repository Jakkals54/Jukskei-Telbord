<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jukskei Scoreboard Pro</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent-blue: #3b82f6;
            --accent-green: #16a34a;
            --accent-yellow: #facc15;
            --border: #334155;
        }

        /* Prevent the whole page from bouncing/scrolling */
        html, body {
            overflow: hidden;
            height: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            overscroll-behavior: none;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .container { 
            max-width: 950px; 
            margin: auto; 
            display: flex; 
            flex-direction: column; 
            /* Fixed position and svh prevents the "shift" when scrolling or buttons are pressed */
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100svh;
            padding: 10px;
            box-sizing: border-box;
        }
        
        /* TOP SECTION (FIXED) */
        .fixed-top {
            flex-shrink: 0;
            width: 100%;
        }

        #scoreDisplay { font-size: 22px; margin: 5px 0 10px 0; font-weight: bold; color: white; text-align: center;}
        .editable-name { border-bottom: 2px dashed var(--accent-blue); padding: 2px 5px; color: #60a5fa; }

        .timer-box { background: var(--panel-bg); padding: 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); text-align: center;}
        #timerDisplay { font-size: 40px; font-family: 'Courier New', monospace; color: #f8fafc; margin: 5px 0; font-weight: bold; }
        
        /* BUTTONS */
        .btn-main { padding: 12px 15px; font-size: 16px; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-start { background: var(--accent-green); min-width: 120px; }
        .btn-pause { background: #ef4444; min-width: 120px; }
        .btn-continue { background: var(--accent-yellow); color: #000; min-width: 120px; }
        .btn-reset { background: #64748b; margin-left: 5px; }
        
        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 10px; }
        .big-btn { font-size: 32px; width: 70px; height: 55px; background: #22c55e; border: none; border-radius: 12px; color: white; box-shadow: 0 4px 0 #16a34a; cursor: pointer; }
        .small-btn { font-size: 18px; width: 40px; height: 45px; background: #ef4444; border: none; border-radius: 10px; color: white; box-shadow: 0 4px 0 #b91c1c; cursor: pointer; }
        .pen-display { font-size: 38px; font-weight: bold; color: var(--accent-yellow); min-width: 45px; text-align: center;}
        input[type="number"] { width: 60px; padding: 10px; background: var(--bg-dark); color: white; border: 2px solid var(--border); border-radius: 8px; font-size: 18px; text-align: center; font-weight: bold; }

        /* MIDDLE SECTION (ONLY SCROLLABLE PART) */
        .table-container {
            flex-grow: 1;
            overflow-y: auto;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-dark);
            -webkit-overflow-scrolling: touch;
            margin-bottom: 5px;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0px 4px; text-align: center;}
        thead th { 
            background: #334155; 
            padding: 10px 2px; 
            font-size: 12px; 
            position: sticky; 
            top: 0; 
            z-index: 20; 
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        td { background: var(--panel-bg); height: 48px; color: white;}
        
        .col-track { width: 100px; }
        .col-spacer { width: 20px; background: transparent !important; }
        
        .score-block { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: rgba(255,255,255,0.1); }
        .active-A { background: var(--accent-green) !important; color: white !important; box-shadow: inset 0 0 8px rgba(0,0,0,0.5); border: 1px solid #4ade80; }
        .active-B { background: #2563eb !important; color: white !important; box-shadow: inset 0 0 8px rgba(0,0,0,0.5); border: 1px solid #60a5fa; }

        input[type="checkbox"] { 
            appearance: none; -webkit-appearance: none; width: 22px; height: 22px;
            background-color: #334155; border: 2px solid #475569; border-radius: 4px;
            display: inline-grid; place-content: center;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-yellow); border-color: #fef08a; }
        input[type="checkbox"]::before { content: ""; width: 12px; height: 12px; transform: scale(0); box-shadow: inset 1em 1em var(--bg-dark); clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); }
        input[type="checkbox"]:checked::before { transform: scale(1); }
    </style>
</head>
<body>

<div class="container">
    <div class="fixed-top">
        <h2 id="scoreDisplay">
            <span id="teamAName" contenteditable="true" class="editable-name">Kranspoort</span>: <span id="valA">0</span> | 
            <span id="teamBName" contenteditable="true" class="editable-name">Opponente</span>: <span id="valB">0</span>
        </h2>

        <div class="timer-box">
            <div style="margin-bottom: 5px;">
                <select id="gameTime" style="background:var(--bg-dark); color:white; padding:8px; border-radius:8px; border:1px solid var(--border)">
                    <option value="20">20</option><option value="25">25</option><option value="30" selected>30</option>
                    <option value="35">35</option><option value="40">40</option><option value="45">45</option>
                    <option value="50">50</option><option value="55">55</option><option value="60">60</option>
                </select>
                <button id="timerToggle" class="btn-main btn-start" onclick="toggleTimer()"><span>▶</span> Begin</button>
                <button class="btn-main btn-reset" onclick="resetTimer()"><span>↺</span></button>
            </div>
            <h1 id="timerDisplay">00:00</h1>
        </div>

        <button class="btn-main" style="background:#6366f1; width:100%; margin-bottom:8px;" onclick="fullReset()">Nuwe Wedstryd</button>

        <div class="controls-row">
            <div style="display:flex; align-items:center; gap:8px;">
                <button class="big-btn" onclick="addPen('A')">+</button>
                <button class="small-btn" onclick="removePen('A')">-</button>
                <span id="penA" class="pen-display">0</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <span id="penB" class="pen-display">0</span>
                <button class="small-btn" onclick="removePen('B')">-</button>
                <button class="big-btn" onclick="addPen('B')">+</button>
                
            </div>
        </div>

        <div class="controls-row">
            <input type="number" id="leA" placeholder="Lê" inputmode="numeric">
            <button class="btn-main" style="flex-grow:1; background:#2563eb; height:50px;" onclick="addRound()">Eindig Rondte</button>
            <input type="number" id="leB" placeholder="Lê" inputmode="numeric">
        </div>
    </div>

    <div class="table-container" id="scrollWindow">
        <table id="scoreTable">
            <thead>
                <tr>
                    <th style="width:35px;">P</th><th style="width:35px;">✓</th><th class="col-spacer"></th>
                    <th class="col-track">Span A</th>
                    <th style="width:35px;">#</th>
                    <th class="col-track">Span B</th>
                    <th class="col-spacer"></th><th style="width:35px;">✓</th><th style="width:35px;">P</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
// ================= BUILD TABLE =================
const tbody = document.querySelector("#scoreTable tbody");
for (let i = 1; i <= 23; i++) {
    const row = document.createElement("tr");
    row.id = `row-${i}`;
    row.innerHTML = `
        <td style="font-size:10px; color:#94a3b8;">${i <= 10 ? i : ""}</td>
        <td>${i <= 10 ? '<input type="checkbox" disabled>' : ""}</td>
        <td class="col-spacer"></td>
        <td id="trackA-${i}" class="col-track"><div class="score-block">${i}</div></td>
        <td style="background:#334155; font-weight:bold;">${i}</td>
        <td id="trackB-${i}" class="col-track"><div class="score-block">${i}</div></td>
        <td class="col-spacer"></td>
        <td>${i <= 10 ? '<input type="checkbox" disabled>' : ""}</td>
        <td style="font-size:10px; color:#94a3b8;">${i <= 10 ? i : ""}</td>
    `;
    tbody.appendChild(row);
}

// ================= APP LOGIC =================
let penA = 0, penB = 0, scoreA = 0, scoreB = 0;

function updateScoreDisplay() {
    document.getElementById("valA").innerText = scoreA;
    document.getElementById("valB").innerText = scoreB;
    renderProgress();
    autoCenterView();
}

function renderProgress() {
    for (let i = 1; i <= 23; i++) {
        const bA = document.getElementById(`trackA-${i}`).firstElementChild;
        i <= scoreA ? bA.classList.add('active-A') : bA.classList.remove('active-A');
        const bB = document.getElementById(`trackB-${i}`).firstElementChild;
        i <= scoreB ? bB.classList.add('active-B') : bB.classList.remove('active-B');
    }
}

// FIXED AUTO-CENTER: Only scrolls the internal div
function autoCenterView() {
    if (scoreA === 0 && scoreB === 0) return;
    
    const average = Math.round((scoreA + scoreB) / 2);
    const target = Math.max(average, 4); 
    
    const row = document.getElementById(`row-${target}`);
    const scrollWindow = document.getElementById("scrollWindow");
    
    if (row && scrollWindow) {
        const rowTop = row.offsetTop;
        const containerHeight = scrollWindow.clientHeight;
        const scrollTarget = rowTop - (containerHeight / 2) + (row.clientHeight / 2);

        scrollWindow.scrollTo({
            top: scrollTarget,
            behavior: 'smooth'
        });
    }
}

function addRound() {
    let leA = parseInt(document.getElementById("leA").value) || 0;
    let leB = parseInt(document.getElementById("leB").value) || 0;
    let diff = Math.abs(penA - penB);
    let penPts = diff * 3;
    
    if (penA > penB) scoreA += penPts;
    else if (penB > penA) scoreB += penPts;

    if (leA > leB) scoreA += leA;
    else if (leB > leA) scoreB += leB;

    if (scoreA > 23) scoreA = 23; if (scoreB > 23) scoreB = 23;
    updateScoreDisplay();
    resetRoundInputs();
    
    // Unfocus inputs to hide keyboard on mobile
    document.getElementById("leA").blur();
    document.getElementById("leB").blur();
}

function fullReset() {
    if (confirm("Begin nuwe wedstryd?")) {
        scoreA = 0; scoreB = 0;
        document.getElementById("teamBName").innerText = "Opponente";
        updateScoreDisplay();
        resetRoundInputs();
        document.getElementById("scrollWindow").scrollTo({ top: 0, behavior: 'smooth' });
    }
}

function resetRoundInputs() {
    penA = 0; penB = 0;
    document.getElementById("penA").innerText = 0;
    document.getElementById("penB").innerText = 0;
    document.getElementById("leA").value = "";
    document.getElementById("leB").value = "";
    document.querySelectorAll("#scoreTable input[type='checkbox']").forEach(c => c.checked = false);
}

// ================= TIMER LOGIC =================
let countdown, totalSeconds = 0, timerState = "stopped";

function toggleTimer() {
    const btn = document.getElementById("timerToggle");
    if (timerState === "stopped" || timerState === "paused") {
        if (timerState === "stopped") totalSeconds = parseInt(document.getElementById("gameTime").value) * 60;
        timerState = "running";
        btn.innerHTML = "<span>⏸</span> Pouseer";
        btn.className = "btn-main btn-pause";
        runTimer();
    } else {
        timerState = "paused";
        clearInterval(countdown);
        btn.innerHTML = "<span>▶</span> Go";
        btn.className = "btn-main btn-continue";
    }
}

function runTimer() {
    countdown = setInterval(() => {
        if (totalSeconds <= 0) {
            clearInterval(countdown);
            timerState = "stopped";
            resetTimerUI();
            alert("Tyd verstreke!");
            return;
        }
        totalSeconds--;
        let m = Math.floor(totalSeconds / 60), s = totalSeconds % 60;
        document.getElementById("timerDisplay").innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }, 1000);
}

function resetTimer() {
    clearInterval(countdown);
    timerState = "stopped";
    totalSeconds = 0;
    document.getElementById("timerDisplay").innerText = "00:00";
    resetTimerUI();
}

function resetTimerUI() {
    const btn = document.getElementById("timerToggle");
    btn.innerHTML = "<span>▶</span> Begin";
    btn.className = "btn-main btn-start";
}

function addPen(t) {
    const rows = document.querySelectorAll("#scoreTable tbody tr");
    if (t === 'A' && penA < 10) { rows[penA].children[1].querySelector("input").checked = true; penA++; }
    else if (t === 'B' && penB < 10) { rows[penB].children[7].querySelector("input").checked = true; penB++; }
    document.getElementById("pen" + t).innerText = (t === 'A' ? penA : penB);
}
function removePen(t) {
    const rows = document.querySelectorAll("#scoreTable tbody tr");
    
    if (t === 'A') {
        if (penA > 0) {
            // Priority 1: Deduct from current round (Pen count)
            penA--;
            rows[penA].children[1].querySelector("input").checked = false;
            document.getElementById("penA").innerText = penA;
        } else if (scoreA > 0) {
            // Priority 2: Deduct from main scoreboard if pen is empty
            scoreA--;
            updateScoreDisplay();
        }
    } else if (t === 'B') {
        if (penB > 0) {
            // Priority 1: Deduct from current round (Pen count)
            penB--;
            rows[penB].children[7].querySelector("input").checked = false;
            document.getElementById("penB").innerText = penB;
        } else if (scoreB > 0) {
            // Priority 2: Deduct from main scoreboard if pen is empty
            scoreB--;
            updateScoreDisplay();
        }
    }
}
</script>
</body>
</html>
