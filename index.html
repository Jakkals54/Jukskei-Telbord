<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jukskei Scoreboard Pro</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent-blue: #3b82f6;
            --accent-green: #16a34a;
            --accent-yellow: #facc15;
            --border: #334155;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            margin: 0;
            background: var(--bg-dark);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* Main Wrapper */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100svh;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 1. TOP HEADER (Score & Timer) */
        header {
            flex-shrink: 0;
            padding: 10px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        #scoreDisplay { font-size: 20px; margin: 0 0 10px 0; text-align: center; font-weight: bold; }
        .editable-name { color: #60a5fa; border-bottom: 1px dashed #60a5fa; }
        
        .timer-box { 
            background: var(--panel-bg); 
            border-radius: 10px; 
            padding: 8px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
        }
        #timerDisplay { font-size: 32px; font-weight: bold; font-family: monospace; }

        /* 2. MIDDLE (Scrollable Table) */
        .table-area {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 5px 10px;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
        thead th { position: sticky; top: 0; background: #334155; font-size: 10px; padding: 8px 0; z-index: 5; }
        td { background: var(--panel-bg); height: 40px; text-align: center; }
        .score-block { font-size: 14px; opacity: 0.2; font-weight: bold; }
        .active-A { background: var(--accent-green) !important; opacity: 1 !important; }
        .active-B { background: var(--accent-blue) !important; opacity: 1 !important; }

        /* 3. BOTTOM PANEL (Inputs & Buttons) */
        footer {
            flex-shrink: 0;
            background: var(--panel-bg);
            padding: 15px 10px calc(15px + env(safe-area-inset-bottom));
            border-top: 2px solid var(--border);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }

        .pen-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .pen-controls { display: flex; align-items: center; gap: 8px; }
        .pen-val { font-size: 30px; font-weight: bold; color: var(--accent-yellow); min-width: 30px; text-align: center; }
        
        .action-row { display: flex; gap: 10px; align-items: center; }
        input[type="number"] { 
            width: 60px; height: 50px; background: var(--bg-dark); color: white; 
            border: 2px solid var(--border); border-radius: 8px; text-align: center; font-size: 20px; 
        }
        .btn-finish { flex-grow: 1; height: 50px; background: var(--accent-blue); border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; }

        /* Utility Buttons */
        .circ-btn { width: 45px; height: 45px; border-radius: 50%; border: none; color: white; font-size: 24px; font-weight: bold; }
        .btn-plus { background: var(--accent-green); }
        .btn-minus { background: #ef4444; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div id="scoreDisplay">
            <span id="teamAName" contenteditable="true" class="editable-name">Kranspoort</span>: <span id="valA">0</span> | 
            <span id="teamBName" contenteditable="true" class="editable-name">Opponente</span>: <span id="valB">0</span>
        </div>
        <div class="timer-box">
            <div id="timerDisplay">00:00</div>
            <button onclick="toggleTimer()" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:5px 10px;">▶ Start</button>
            <button onclick="fullReset()" style="background:none; border:none; color:#94a3b8; font-size:12px;">↺ Reset All</button>
        </div>
    </header>

    <div class="table-area" id="scrollWindow">
        <table>
            <thead>
                <tr>
                    <th>P</th><th>✓</th><th style="width:10px"></th>
                    <th style="width:80px">Span A</th>
                    <th>#</th>
                    <th style="width:80px">Span B</th>
                    <th style="width:10px"></th><th>✓</th><th>P</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <footer>
        <div class="pen-row">
            <div class="pen-controls">
                <button class="circ-btn btn-plus" onclick="addPen('A')">+</button>
                <button class="circ-btn btn-minus" onclick="removePen('A')">-</button>
                <span class="pen-val" id="penA">0</span>
            </div>
            <div style="font-size:12px; color:#94a3b8;">PENNE</div>
            <div class="pen-controls">
                <span class="pen-val" id="penB">0</span>
                <button class="circ-btn btn-plus" onclick="addPen('B')">+</button>
                <button class="circ-btn btn-minus" onclick="removePen('B')">-</button>
            </div>
        </div>

        <div class="action-row">
            <input type="number" id="leA" placeholder="Lê" inputmode="decimal">
            <button class="btn-finish" onclick="addRound()">EINDIG RONDTE</button>
            <input type="number" id="leB" placeholder="Lê" inputmode="decimal">
        </div>
    </footer>
</div>

<script>
let penA = 0, penB = 0, scoreA = 0, scoreB = 0;

// Build Table
const tbody = document.getElementById("tableBody");
for (let i = 1; i <= 23; i++) {
    const row = document.createElement("tr");
    row.id = `row-${i}`;
    row.innerHTML = `
        <td style="font-size:10px;">${i <= 10 ? i : ""}</td>
        <td>${i <= 10 ? '<input type="checkbox" disabled id="checkA-'+i+'">' : ""}</td>
        <td></td>
        <td id="trackA-${i}"><div class="score-block">${i}</div></td>
        <td style="background:#334155;">${i}</td>
        <td id="trackB-${i}"><div class="score-block">${i}</div></td>
        <td></td>
        <td>${i <= 10 ? '<input type="checkbox" disabled id="checkB-'+i+'">' : ""}</td>
        <td style="font-size:10px;">${i <= 10 ? i : ""}</td>
    `;
    tbody.appendChild(row);
}

function updateScoreDisplay() {
    document.getElementById("valA").innerText = scoreA;
    document.getElementById("valB").innerText = scoreB;
    for (let i = 1; i <= 23; i++) {
        document.getElementById(`trackA-${i}`).firstElementChild.className = i <= scoreA ? 'score-block active-A' : 'score-block';
        document.getElementById(`trackB-${i}`).firstElementChild.className = i <= scoreB ? 'score-block active-B' : 'score-block';
    }
    autoCenterView();
}

function autoCenterView() {
    const target = Math.max(Math.round((scoreA + scoreB) / 2), 4);
    const row = document.getElementById(`row-${target}`);
    const win = document.getElementById("scrollWindow");
    if (row) win.scrollTo({ top: row.offsetTop - (win.offsetHeight / 2), behavior: 'smooth' });
}

function addPen(t) {
    if (t === 'A' && penA < 10) { penA++; document.getElementById('checkA-'+penA).checked = true; }
    else if (t === 'B' && penB < 10) { penB++; document.getElementById('checkB-'+penB).checked = true; }
    document.getElementById("pen" + t).innerText = (t === 'A' ? penA : penB);
}

function removePen(t) {
    if (t === 'A' && penA > 0) { document.getElementById('checkA-'+penA).checked = false; penA--; }
    else if (t === 'B' && penB > 0) { document.getElementById('checkB-'+penB).checked = false; penB--; }
    document.getElementById("pen" + t).innerText = (t === 'A' ? penA : penB);
}

function addRound() {
    let leA = parseInt(document.getElementById("leA").value) || 0;
    let leB = parseInt(document.getElementById("leB").value) || 0;
    let diff = Math.abs(penA - penB);
    if (penA > penB) scoreA += (diff * 3); else if (penB > penA) scoreB += (diff * 3);
    if (leA > leB) scoreA += leA; else if (leB > leA) scoreB += leB;
    scoreA = Math.min(scoreA, 23); scoreB = Math.min(scoreB, 23);
    
    updateScoreDisplay();
    // Reset inputs
    penA = 0; penB = 0;
    document.getElementById("penA").innerText = 0; document.getElementById("penB").innerText = 0;
    document.getElementById("leA").value = ""; document.getElementById("leB").value = "";
    document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
    document.activeElement.blur(); // Hide keyboard
}

function fullReset() {
    if(confirm("New Game?")) location.reload();
}

// Timer Logic
let timer, seconds = 1800; 
function toggleTimer() {
    if (timer) { clearInterval(timer); timer = null; } 
    else { timer = setInterval(() => {
        seconds--;
        let m = Math.floor(seconds/60), s = seconds%60;
        document.getElementById("timerDisplay").innerText = `${m}:${s<10?'0':''}${s}`;
    }, 1000); }
}
</script>
</body>
</html>
