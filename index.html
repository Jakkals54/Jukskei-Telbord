<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jukskei Scoreboard Pro</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent-blue: #3b82f6;
            --accent-green: #16a34a;
            --accent-yellow: #facc15;
            --border: #334155;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            /* Prevents the browser from trying to be helpful by scrolling the page */
            overscroll-behavior: none; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #app-container { 
            max-width: 950px; 
            margin: auto; 
            display: flex; 
            flex-direction: column; 
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            /* We use a variable for height that the script will update */
            height: 100vh; 
            padding: calc(10px + env(safe-area-inset-top)) 10px 10px 10px;
            box-sizing: border-box;
            background: var(--bg-dark);
        }
        
        .fixed-top {
            flex-shrink: 0;
            width: 100%;
        }

        #scoreDisplay { font-size: 22px; margin: 0 0 10px 0; font-weight: bold; color: white; text-align: center;}
        .editable-name { border-bottom: 2px dashed var(--accent-blue); padding: 2px 5px; color: #60a5fa; }

        .timer-box { background: var(--panel-bg); padding: 8px; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); text-align: center;}
        #timerDisplay { font-size: 38px; font-family: 'Courier New', monospace; color: #f8fafc; margin: 2px 0; font-weight: bold; }
        
        .btn-main { padding: 10px 15px; font-size: 16px; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-start { background: var(--accent-green); min-width: 110px; }
        .btn-pause { background: #ef4444; min-width: 110px; }
        .btn-continue { background: var(--accent-yellow); color: #000; min-width: 110px; }
        .btn-reset { background: #64748b; margin-left: 5px; }
        
        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
        .big-btn { font-size: 28px; width: 65px; height: 50px; background: #22c55e; border: none; border-radius: 12px; color: white; box-shadow: 0 4px 0 #16a34a; cursor: pointer; }
        .small-btn { font-size: 18px; width: 35px; height: 40px; background: #ef4444; border: none; border-radius: 10px; color: white; box-shadow: 0 4px 0 #b91c1c; cursor: pointer; }
        .pen-display { font-size: 32px; font-weight: bold; color: var(--accent-yellow); min-width: 40px; text-align: center;}
        
        /* inputmode="decimal" helps prevent full layout shifts on some devices */
        input[type="number"] { width: 55px; padding: 8px; background: var(--bg-dark); color: white; border: 2px solid var(--border); border-radius: 8px; font-size: 18px; text-align: center; font-weight: bold; }

        .table-container {
            flex-grow: 1;
            overflow-y: auto;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-dark);
            -webkit-overflow-scrolling: touch;
            margin-bottom: 5px;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0px 4px; text-align: center;}
        thead th { 
            background: #334155; 
            padding: 8px 2px; 
            font-size: 11px; 
            position: sticky; 
            top: 0; 
            z-index: 20; 
            color: white;
        }
        td { background: var(--panel-bg); height: 44px; color: white;}
        
        .col-track { width: 90px; }
        .col-spacer { width: 15px; background: transparent !important; }
        
        .score-block { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: rgba(255,255,255,0.1); }
        .active-A { background: var(--accent-green) !important; color: white !important; }
        .active-B { background: #2563eb !important; color: white !important; }

        input[type="checkbox"] { 
            appearance: none; -webkit-appearance: none; width: 20px; height: 20px;
            background-color: #334155; border: 2px solid #475569; border-radius: 4px;
            display: inline-grid; place-content: center;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-yellow); border-color: #fef08a; }
        input[type="checkbox"]::before { content: ""; width: 10px; height: 10px; transform: scale(0); box-shadow: inset 1em 1em var(--bg-dark); clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); }
        input[type="checkbox"]:checked::before { transform: scale(1); }
    </style>
</head>
<body>

<div id="app-container">
    <div class="fixed-top">
        <h2 id="scoreDisplay">
            <span id="teamAName" contenteditable="true" class="editable-name">Kranspoort</span>: <span id="valA">0</span> | 
            <span id="teamBName" contenteditable="true" class="editable-name">Opponente</span>: <span id="valB">0</span>
        </h2>

        <div class="timer-box">
            <div style="margin-bottom: 5px;">
                <select id="gameTime" style="background:var(--bg-dark); color:white; padding:6px; border-radius:8px; border:1px solid var(--border)">
                    <option value="30" selected>30</option>
                    <option value="45">45</option>
                    <option value="60">60</option>
                </select>
                <button id="timerToggle" class="btn-main btn-start" onclick="toggleTimer()"><span>▶</span> Begin</button>
                <button class="btn-main btn-reset" onclick="resetTimer()"><span>↺</span></button>
            </div>
            <h1 id="timerDisplay">00:00</h1>
        </div>

        <button class="btn-main" style="background:#6366f1; width:100%; margin-bottom:8px;" onclick="fullReset()">Nuwe Wedstryd</button>

        <div class="controls-row">
            <div style="display:flex; align-items:center; gap:8px;">
                <button class="big-btn" onclick="addPen('A')">+</button>
                <button class="small-btn" onclick="removePen('A')">-</button>
                <span id="penA" class="pen-display">0</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <span id="penB" class="pen-display">0</span>
                <button class="big-btn" onclick="addPen('B')">+</button>
                <button class="small-btn" onclick="removePen('B')">-</button>
            </div>
        </div>

        <div class="controls-row">
            <input type="number" id="leA" placeholder="Lê" inputmode="decimal">
            <button class="btn-main" style="flex-grow:1; background:#2563eb; height:50px;" onclick="addRound()">Eindig Rondte</button>
            <input type="number" id="leB" placeholder="Lê" inputmode="decimal">
        </div>
    </div>

    <div class="table-container" id="scrollWindow">
        <table id="scoreTable">
            <thead>
                <tr>
                    <th style="width:30px;">P</th><th style="width:30px;">✓</th><th class="col-spacer"></th>
                    <th class="col-track">Span A</th>
                    <th style="width:30px;">#</th>
                    <th class="col-track">Span B</th>
                    <th class="col-spacer"></th><th style="width:30px;">✓</th><th style="width:30px;">P</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
// ================= VIEWPORT FIX (THE CURE) =================
// This keeps the app visible even when the keyboard pops up
function adjustViewport() {
    const view = window.visualViewport;
    const container = document.getElementById('app-container');
    
    // Set the height of our container to the height of the VISIBLE area
    container.style.height = `${view.height}px`;
    // Offset the container so it's always at the top of the visible area
    container.style.top = `${view.offsetTop}px`;
    
    // Force the scroll to the top of the document to prevent browser "push"
    window.scrollTo(0, 0);
}

if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', adjustViewport);
    window.visualViewport.addEventListener('scroll', adjustViewport);
}

// ================= BUILD TABLE =================
const tbody = document.querySelector("#scoreTable tbody");
for (let i = 1; i <= 23; i++) {
    const row = document.createElement("tr");
    row.id = `row-${i}`;
    row.innerHTML = `
        <td style="font-size:10px; color:#94a3b8;">${i <= 10 ? i : ""}</td>
        <td>${i <= 10 ? '<input type="checkbox" disabled>' : ""}</td>
        <td class="col-spacer"></td>
        <td id="trackA-${i}" class="col-track"><div class="score-block">${i}</div></td>
        <td style="background:#334155; font-weight:bold;">${i}</td>
        <td id="trackB-${i}" class="col-track"><div class="score-block">${i}</div></td>
        <td class="col-spacer"></td>
        <td>${i <= 10 ? '<input type="checkbox" disabled>' : ""}</td>
        <td style="font-size:10px; color:#94a3b8;">${i <= 10 ? i : ""}</td>
    `;
    tbody.appendChild(row);
}

// ================= APP LOGIC =================
let penA = 0, penB = 0, scoreA = 0, scoreB = 0;

function updateScoreDisplay() {
    document.getElementById("valA").innerText = scoreA;
    document.getElementById("valB").innerText = scoreB;
    renderProgress();
    autoCenterView();
}

function renderProgress() {
    for (let i = 1; i <= 23; i++) {
        const bA = document.getElementById(`trackA-${i}`).firstElementChild;
        i <= scoreA ? bA.classList.add('active-A') : bA.classList.remove('active-A');
        const bB = document.getElementById(`trackB-${i}`).firstElementChild;
        i <= scoreB ? bB.classList.add('active-B') : bB.classList.remove('active-B');
    }
}

function autoCenterView() {
    if (scoreA === 0 && scoreB === 0) return;
    const average = Math.round((scoreA + scoreB) / 2);
    const target = Math.max(average, 4); 
    const row = document.getElementById(`row-${target}`);
    const scrollWindow = document.getElementById("scrollWindow");
    if (row && scrollWindow) {
        const rowTop = row.offsetTop;
        const containerHeight = scrollWindow.clientHeight;
        const scrollTarget = rowTop - (containerHeight / 2) + (row.clientHeight / 2);
        scrollWindow.scrollTo({ top: scrollTarget, behavior: 'smooth' });
    }
}

function addRound() {
    let leA = parseInt(document.getElementById("leA").value) || 0;
    let leB = parseInt(document.getElementById("leB").value) || 0;
    let diff = Math.abs(penA - penB);
    let penPts = diff * 3;
    if (penA > penB) scoreA += penPts;
    else if (penB > penA) scoreB += penPts;
    if (leA > leB) scoreA += leA;
    else if (leB > leA) scoreB += leB;
    if (scoreA > 23) scoreA = 23; if (scoreB > 23) scoreB = 23;
    updateScoreDisplay();
    resetRoundInputs();
    
    // This forces the keyboard to close and the layout to reset
    document.activeElement.blur();
}

function fullReset() {
    if (confirm("Begin nuwe wedstryd?")) {
        scoreA = 0; scoreB = 0;
        updateScoreDisplay();
        resetRoundInputs();
        document.getElementById("scrollWindow").scrollTo({ top: 0, behavior: 'smooth' });
    }
}

function resetRoundInputs() {
    penA = 0; penB = 0;
    document.getElementById("penA").innerText = 0;
    document.getElementById("penB").innerText = 0;
    document.getElementById("leA").value = "";
    document.getElementById("leB").value = "";
    document.querySelectorAll("#scoreTable input[type='checkbox']").forEach(c => c.checked = false);
}

// ================= TIMER LOGIC =================
let countdown, totalSeconds = 0, timerState = "stopped";

function toggleTimer() {
    const btn = document.getElementById("timerToggle");
    if (timerState === "stopped" || timerState === "paused") {
        if (timerState === "stopped") totalSeconds = parseInt(document.getElementById("gameTime").value) * 60;
        timerState = "running";
        btn.innerHTML = "<span>⏸</span> Pouse";
        btn.className = "btn-main btn-pause";
        runTimer();
    } else {
        timerState = "paused";
        clearInterval(countdown);
        btn.innerHTML = "<span>▶</span> Voort";
        btn.className = "btn-main btn-continue";
    }
}

function runTimer() {
    countdown = setInterval(() => {
        if (totalSeconds <= 0) {
            clearInterval(countdown);
            timerState = "stopped";
            resetTimerUI();
            alert("Tyd is verby!");
            return;
        }
        totalSeconds--;
        let m = Math.floor(totalSeconds / 60), s = totalSeconds % 60;
        document.getElementById("timerDisplay").innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }, 1000);
}

function resetTimer() {
    clearInterval(countdown);
    timerState = "stopped";
    totalSeconds = 0;
    document.getElementById("timerDisplay").innerText = "00:00";
    resetTimerUI();
}

function resetTimerUI() {
    const btn = document.getElementById("timerToggle");
    btn.innerHTML = "<span>▶</span> Begin";
    btn.className = "btn-main btn-start";
}

function addPen(t) {
    const rows = document.querySelectorAll("#scoreTable tbody tr");
    if (t === 'A' && penA < 10) { rows[penA].children[1].querySelector("input").checked = true; penA++; }
    else if (t === 'B' && penB < 10) { rows[penB].children[7].querySelector("input").checked = true; penB++; }
    document.getElementById("pen" + t).innerText = (t === 'A' ? penA : penB);
}
function removePen(t) {
    const rows = document.querySelectorAll("#scoreTable tbody tr");
    if (t === 'A' && penA > 0) { penA--; rows[penA].children[1].querySelector("input").checked = false; }
    else if (t === 'B' && penB > 0) { penB--; rows[penB].children[7].querySelector("input").checked = false; }
    document.getElementById("pen" + t).innerText = (t === 'A' ? penA : penB);
}
</script>
</body>
</html>
